<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 針對各類行動裝置與 iPad 進行視窗鎖定與縮放優化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>樂天數理大挑戰：數一數有幾個？</title>
    <!-- 引入 Tailwind CSS 用於精美現代的 UI 設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 針對行動裝置優化的無延遲觸控與防誤觸選取 */
        button, div, body {
            -webkit-tap-highlight-color: transparent; /* 移除 iOS 預設的灰色點擊高亮 */
            user-select: none;                         /* 防止幼兒長按文字產生選取框 */
            -webkit-user-select: none;
            touch-action: manipulation;                /* 消除 iOS Safari 300ms 點擊延遲 */
        }
        
        /* 輕微的浮動動畫，讓畫面更活潑 */
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        /* 圖案產生的彈跳動畫 */
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<!-- 使用 dvh 確保在所有手機與平板瀏覽器中完美貼合螢幕，自動適應安全區域 -->
<body class="bg-gradient-to-br from-amber-50 via-teal-50 to-sky-100 min-h-screen min-h-[100dvh] flex flex-col items-center justify-between p-4 sm:p-6 pb-[calc(1rem+env(safe-area-inset-bottom))] pt-[calc(1rem+env(safe-area-inset-top))] font-sans overflow-hidden">

    <!-- 頂部標題區：響應式文字大小 -->
    <header class="w-full max-w-3xl text-center mt-1 sm:mt-2 flex-shrink-0">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-teal-600 tracking-wider drop-shadow-sm select-none">
            🌟 數一數，有幾個？ 🌟
        </h1>
        <p class="text-gray-600 text-sm sm:text-base md:text-lg mt-1 sm:mt-2 font-medium select-none">小朋友，看著大星星數數看，然後大聲說出答案喔！</p>
    </header>

    <!-- 遊戲主要顯示區域（圖案區）：採用彈性寬度與高度適應 -->
    <main class="w-full max-w-4xl bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border-4 border-teal-300 p-4 sm:p-6 md:p-8 my-3 sm:my-4 flex-grow flex flex-col justify-center items-center relative overflow-hidden min-h-[280px]">
        
        <!-- 彩色紙屑畫布 (已針對高解析度 Retina 螢幕進行 RWD 等比縮放) -->
        <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-10"></canvas>

        <!-- 圖案擺放區域：利用 RWD flex-wrap 達成完美自動折行與置中 -->
        <div id="pattern-container" class="flex flex-wrap justify-center items-center content-center w-full h-full min-h-[180px] p-2 gap-4 sm:gap-6 md:gap-8 max-w-3xl">
            <!-- 星星會動態生成在此處 -->
        </div>

        <!-- 答題狀態與回饋文字：高度自適應，防止文字折行時被截斷 -->
        <div id="feedback-text" class="text-2xl sm:text-3xl md:text-4xl font-black mt-4 min-h-[3.5rem] flex flex-col items-center justify-center text-teal-500 text-center select-none w-full px-2">
            請按「🎲 隨機抽星星」開始！
        </div>
    </main>

    <!-- 控制面板：手機直向時自動垂直排列，平板及寬螢幕時自動水平並排 -->
    <footer class="w-full max-w-3xl flex flex-col gap-3 sm:gap-4 flex-shrink-0 mb-1 sm:mb-2">
        
        <!-- RWD 核心功能按鈕 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 w-full">
            
            <!-- 按鈕一：抽取新題目 -->
            <button id="draw-btn" class="bg-gradient-to-r from-pink-400 to-orange-400 hover:from-pink-500 hover:to-orange-500 text-white font-extrabold text-xl sm:text-2xl md:text-3xl py-4 sm:py-5 px-4 rounded-2xl shadow-lg transform active:scale-95 transition-all duration-150 border-b-8 border-pink-600 flex items-center justify-center gap-2">
                <span>🎲</span> 隨機抽星星
            </button>

            <!-- 按鈕二：口頭回答後，按這個揭曉答案 -->
            <button id="answer-btn" onclick="revealAnswer()" class="bg-gradient-to-r from-teal-400 to-emerald-400 hover:from-teal-500 hover:to-emerald-500 text-white font-extrabold text-xl sm:text-2xl md:text-3xl py-4 sm:py-5 px-4 rounded-2xl shadow-lg transform active:scale-95 transition-all duration-150 border-b-8 border-teal-600 flex items-center justify-center gap-2">
                <span>👁️</span> 揭曉答案！
            </button>

        </div>

        <!-- 聲音控制開關 -->
        <div class="flex justify-end w-full px-1">
            <button id="mute-btn" onclick="toggleMute()" class="text-teal-700 bg-white/80 px-4 py-2 rounded-xl shadow-md border border-teal-200 text-xs sm:text-sm font-bold active:scale-95 transition-all">
                🔊 聲音：開啟
            </button>
        </div>
    </footer>

    <script>
        // --- 遊戲狀態變數 ---
        let currentCount = 0;      // 當前畫面上圖案的數量
        let currentPattern = '';   // 當前抽中的圖案 Emoji
        let isAnswerRevealed = false; // 是否已經揭曉答案
        let isMuted = false;       // 是否靜音

        // --- 圖案清單 ---
        const patterns = [
            { char: '⭐', name: '閃亮星星' }
        ];

        // --- DOM 元素取得 ---
        const patternContainer = document.getElementById('pattern-container');
        const feedbackText = document.getElementById('feedback-text');
        const drawBtn = document.getElementById('draw-btn');
        const answerBtn = document.getElementById('answer-btn');
        const muteBtn = document.getElementById('mute-btn');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        // --- Retina 高畫質 Canvas 縮放與大小自適應 ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1; // 支援高解析度螢幕
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 音效合成器 (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放歡樂慶祝音效
        function playCorrectSound() {
            if (isMuted) return;
            initAudio();
            const now = audioCtx.currentTime;
            
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C4 至 C6 和弦
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + index * 0.08);
                
                gain.gain.setValueAtTime(0.15, now + index * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.5);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now + index * 0.08);
                osc.stop(now + index * 0.08 + 0.5);
            });
        }

        // 靜音切換
        function toggleMute() {
            isMuted = !isMuted;
            muteBtn.textContent = isMuted ? '🔇 聲音：關閉' : '🔊 聲音：開啟';
            initAudio(); 
        }

        // --- 核心遊戲邏輯 ---

        // 1. 隨機抽取圖案與數量 (RWD 星星尺寸適配)
        function drawPattern() {
            initAudio(); // 確保使用者互動時解鎖音效
            
            isAnswerRevealed = false;
            stopConfetti();
            
            // 選擇星星
            const randomPick = patterns[Math.floor(Math.random() * patterns.length)];
            currentPattern = randomPick.char;
            
            // 隨機決定數量 (1 - 10 顆)
            currentCount = Math.floor(Math.random() * 10) + 1;

            // 清空舊圖案
            patternContainer.innerHTML = '';
            
            // 【RWD 階梯式星星尺寸調整】
            // 根據數量設定合適的響應式大小（使用 Tailwind 的 RWD 前綴）
            let sizeClass = ""; 

            if (currentCount === 1) {
                // 1 顆時：手機超大、平板極大、桌機超級大
                sizeClass = "text-[140px] sm:text-[180px] md:text-[220px] lg:text-[260px]"; 
            } else if (currentCount <= 3) {
                // 2-3 顆時
                sizeClass = "text-8xl sm:text-9xl md:text-[150px] lg:text-[180px]"; 
            } else if (currentCount <= 6) {
                // 4-6 顆時
                sizeClass = "text-7xl sm:text-8xl md:text-9xl lg:text-[140px]"; 
            } else {
                // 7-10 顆時
                sizeClass = "text-5xl sm:text-6xl md:text-7xl lg:text-8xl"; 
            }

            // 產生圖案
            for (let i = 0; i < currentCount; i++) {
                const item = document.createElement('div');
                item.className = `pop-in flex justify-center items-center ${sizeClass} select-none filter drop-shadow-md leading-none`;
                item.style.animationDelay = `${i * 0.05}s`; // 讓星星一個個彈出來
                item.textContent = currentPattern;
                patternContainer.appendChild(item);
            }

            // 更新提示字，提示小朋友口頭回答
            feedbackText.className = "text-2xl sm:text-3xl md:text-4xl font-bold mt-4 min-h-[3.5rem] flex flex-col items-center justify-center text-amber-500 animate-pulse select-none w-full px-2";
            feedbackText.innerHTML = `<div>有幾個星星呢？數數看，大聲說出來！</div><div class="text-sm sm:text-base md:text-lg text-gray-500 font-medium mt-1">數完後，可以按「揭曉答案」喔！</div>`;
            
            // 讓「揭曉答案」按鈕看起來可以點擊
            answerBtn.style.opacity = '1';
        }

        // 2. 揭曉答案
        function revealAnswer() {
            if (isAnswerRevealed) return; // 避免重複觸發
            
            isAnswerRevealed = true;
            playCorrectSound();
            startConfetti();

            // 在畫面下方顯示超炫的答案，並使數字具有流動縮放感
            feedbackText.className = "text-3xl sm:text-4xl md:text-5xl font-black mt-4 min-h-[3.5rem] flex items-center justify-center text-green-500 float-animation tracking-wider select-none w-full px-2";
            feedbackText.innerHTML = `🎉 答對了！有 <span class="text-red-500 mx-2 text-4xl sm:text-5xl md:text-6xl">${currentCount}</span> 個 ${currentPattern}！`;

            // 讓「揭曉答案」按鈕半透明，暗示已經揭曉
            answerBtn.style.opacity = '0.5';
        }

        // --- 慶祝彩色紙屑特效 (Canvas，已適配 RWD 視網膜解析度) ---
        let confettiParticles = [];
        let confettiAnimationId = null;

        class Confetti {
            constructor() {
                const rect = canvas.getBoundingClientRect();
                this.x = Math.random() * rect.width;
                this.y = Math.random() * rect.height - rect.height;
                this.size = Math.random() * 10 + 8; // 紙屑稍微放大，行動裝置視覺效果更佳
                this.color = `hsl(${Math.random() * 360}, 95%, 60%)`;
                this.speedY = Math.random() * 4 + 3;
                this.speedX = Math.random() * 3 - 1.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 6 - 3;
            }
            update() {
                const rect = canvas.getBoundingClientRect();
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                if (this.y > rect.height) {
                    this.y = -20;
                    this.x = Math.random() * rect.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function startConfetti() {
            stopConfetti();
            resizeCanvas();
            confettiParticles = [];
            for (let i = 0; i < 75; i++) { 
                confettiParticles.push(new Confetti());
            }
            animateConfetti();
        }

        function animateConfetti() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            confettiParticles.forEach(p => {
                p.update();
                p.draw();
            });
            confettiAnimationId = requestAnimationFrame(animateConfetti);
        }

        function stopConfetti() {
            if (confettiAnimationId) {
                cancelAnimationFrame(confettiAnimationId);
                const rect = canvas.getBoundingClientRect();
                ctx.clearRect(0, 0, rect.width, rect.height);
                confettiParticles = [];
            }
        }

        // 綁定「隨機抽星星」按鈕點擊事件
        drawBtn.addEventListener('click', drawPattern);

        // 初始化：一進畫面直接幫小朋友抽好第一個題目
        window.onload = () => {
            drawPattern();
        };
    </script>
</body>
</html>
